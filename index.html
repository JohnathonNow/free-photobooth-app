<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #video-container {
            position: relative;
            margin-bottom: 20px;
        }
        video {
            border: 5px solid #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background-color: #000;
        }
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #canvas {
            display: none;
        }
        #print-frame {
            display: none;
        }
        #controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }
        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }
        select {
            padding: 15px;
            font-size: 18px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Photo Booth</h1>

    <div id="video-container">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="overlay-canvas" width="640" height="480"></canvas>
        <div id="countdown"></div>
    </div>

    <div id="controls">
        <button id="settings-btn">Settings</button>
        <button id="overlay-btn">Overlay Editor</button>
        <button id="snap-btn">Take Photo</button>
    </div>

    <div id="overlay-menu" class="menu-panel">
        <div class="config-item">
            <label for="overlay-frame">Frame Image:</label>
            <input type="file" id="overlay-frame" accept="image/*">
        </div>
        <div class="config-item">
            <label for="overlay-text">Text:</label>
            <input type="text" id="overlay-text" placeholder="Enter text">
        </div>
        <div class="config-item">
            <label for="overlay-font">Font:</label>
            <select id="overlay-font">
                <option value="sans-serif">Sans-Serif</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
                <option value="Impact">Impact</option>
                <option value="Comic Sans MS">Comic Sans</option>
            </select>
        </div>
        <div class="config-item">
            <label for="overlay-style">Style:</label>
            <select id="overlay-style">
                <option value="normal">Normal</option>
                <option value="bold">Bold</option>
                <option value="italic">Italic</option>
                <option value="italic bold">Bold Italic</option>
            </select>
        </div>
        <div class="config-item">
            <label for="overlay-size">Size:</label>
            <input type="number" id="overlay-size" value="48" min="10" max="200">
        </div>
        <div class="config-item">
            <label for="overlay-fill">Fill Color:</label>
            <input type="color" id="overlay-fill" value="#ffffff">
        </div>
        <div class="config-item">
            <label for="overlay-outline">Outline Color:</label>
            <input type="color" id="overlay-outline" value="#000000">
        </div>
        <div class="config-item">
            <label for="overlay-x">X Position:</label>
            <input type="number" id="overlay-x" value="320">
        </div>
        <div class="config-item">
            <label for="overlay-y">Y Position:</label>
            <input type="number" id="overlay-y" value="400">
        </div>
        <div class="config-item">
            <button id="hide-overlay-btn">Hide Overlay Editor</button>
        </div>
    </div>

    <div id="config-menu" class="menu-panel">
        <div class="config-item">
            <label for="action-select">Action:</label>
            <select id="action-select">
                <option value="save-print">Save & Print</option>
                <option value="print-only">Print Only</option>
                <option value="save-only">Save Only</option>
            </select>
        </div>
        <div class="config-item">
            <label for="timer-select">Timer:</label>
            <select id="timer-select">
                <option value="0">Instant</option>
                <option value="1">1 second</option>
                <option value="3">3 seconds</option>
                <option value="5" selected>5 seconds</option>
                <option value="10">10 seconds</option>
            </select>
        </div>
        <div class="config-item">
            <label for="filter-select">Filter:</label>
            <select id="filter-select">
                <option value="none">Normal</option>
                <option value="grayscale(100%)">Grayscale</option>
                <option value="sepia(100%)">Sepia</option>
                <option value="invert(100%)">Invert</option>
                <option value="hue-rotate(90deg)">Hue Rotate</option>
                <option value="contrast(200%)">High Contrast</option>
            </select>
        </div>
        <div class="config-item">
            <button id="hide-btn">Hide Settings</button>
        </div>
    </div>
    <canvas id="canvas" width="640" height="480"></canvas>
    <iframe id="print-frame" name="print-frame"></iframe>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const hideBtn = document.getElementById('hide-btn');
        const configMenu = document.getElementById('config-menu');
        const actionSelect = document.getElementById('action-select');
        const timerSelect = document.getElementById('timer-select');
        const countdownDisplay = document.getElementById('countdown');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const printFrame = document.getElementById('print-frame');
        const filterSelect = document.getElementById('filter-select');

        // Overlay Editor elements
        const overlayBtn = document.getElementById('overlay-btn');
        const hideOverlayBtn = document.getElementById('hide-overlay-btn');
        const overlayMenu = document.getElementById('overlay-menu');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const overlayContext = overlayCanvas.getContext('2d');
        const overlayFrame = document.getElementById('overlay-frame');
        const overlayText = document.getElementById('overlay-text');
        const overlayFont = document.getElementById('overlay-font');
        const overlayStyle = document.getElementById('overlay-style');
        const overlaySize = document.getElementById('overlay-size');
        const overlayFill = document.getElementById('overlay-fill');
        const overlayOutline = document.getElementById('overlay-outline');
        const overlayX = document.getElementById('overlay-x');
        const overlayY = document.getElementById('overlay-y');

        let frameImage = null;
        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.has('action')) {
            const actionVal = urlParams.get('action');
            if (Array.from(actionSelect.options).some(opt => opt.value === actionVal)) {
                actionSelect.value = actionVal;
            }
        }

        if (urlParams.has('timer')) {
            const timerVal = urlParams.get('timer');
            if (Array.from(timerSelect.options).some(opt => opt.value === timerVal)) {
                timerSelect.value = timerVal;
            }
        }

        if (urlParams.has('filter')) {
            const filterVal = urlParams.get('filter');
            if (Array.from(filterSelect.options).some(opt => opt.value === filterVal)) {
                filterSelect.value = filterVal;
                video.style.filter = filterVal;
            }
        }

        function updateURL() {
            const currentParams = new URLSearchParams(window.location.search);
            currentParams.set('action', actionSelect.value);
            currentParams.set('timer', timerSelect.value);
            currentParams.set('filter', filterSelect.value);

            const newUrl = `${window.location.pathname}?${currentParams.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        settingsBtn.addEventListener('click', () => {
            overlayMenu.style.display = 'none';
            if (configMenu.style.display === 'flex') {
                configMenu.style.display = 'none';
            } else {
                configMenu.style.display = 'flex';
            }
        });

        hideBtn.addEventListener('click', () => {
            configMenu.style.display = 'none';
        });

        overlayBtn.addEventListener('click', () => {
            configMenu.style.display = 'none';
            if (overlayMenu.style.display === 'flex') {
                overlayMenu.style.display = 'none';
            } else {
                overlayMenu.style.display = 'flex';
            }
        });

        hideOverlayBtn.addEventListener('click', () => {
            overlayMenu.style.display = 'none';
        });

        function updateOverlay() {
            overlayContext.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (frameImage) {
                overlayContext.drawImage(frameImage, 0, 0, overlayCanvas.width, overlayCanvas.height);
            }

            const text = overlayText.value;
            if (text) {
                const style = overlayStyle.value === 'normal' ? '' : overlayStyle.value;
                const size = overlaySize.value + 'px';
                const font = overlayFont.value;

                overlayContext.font = `${style} ${size} ${font}`.trim();
                overlayContext.textAlign = 'center';

                const x = parseInt(overlayX.value, 10);
                const y = parseInt(overlayY.value, 10);

                overlayContext.fillStyle = overlayFill.value;
                overlayContext.fillText(text, x, y);

                overlayContext.lineWidth = 2;
                overlayContext.strokeStyle = overlayOutline.value;
                overlayContext.strokeText(text, x, y);
            }
        }

        overlayFrame.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        frameImage = img;
                        updateOverlay();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                frameImage = null;
                updateOverlay();
            }
        });

        [overlayText, overlayFont, overlayStyle, overlaySize, overlayFill, overlayOutline, overlayX, overlayY].forEach(el => {
            el.addEventListener('input', updateOverlay);
        });

        actionSelect.addEventListener('change', updateURL);
        timerSelect.addEventListener('change', updateURL);
        filterSelect.addEventListener('change', () => {
            video.style.filter = filterSelect.value;
            updateURL();
        });

        // Request webcam access
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Error accessing webcam:", err);
                alert("Could not access the webcam.");
            });

        snapBtn.addEventListener('click', () => {
            snapBtn.disabled = true;
            let counter = parseInt(timerSelect.value, 10);
            
            if (counter === 0) {
                takePhoto();
            } else {
                countdownDisplay.style.display = 'block';
                countdownDisplay.innerText = counter;

                const interval = setInterval(() => {
                    counter--;
                    if (counter > 0) {
                        countdownDisplay.innerText = counter;
                    } else {
                        clearInterval(interval);
                        countdownDisplay.style.display = 'none';
                        takePhoto();
                    }
                }, 1000);
            }
        });

        function takePhoto() {
            // Draw video frame to canvas
            context.filter = filterSelect.value;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            context.filter = 'none'; // reset filter before drawing overlay

            // Draw overlay to main canvas
            context.drawImage(overlayCanvas, 0, 0, canvas.width, canvas.height);

            // Get image data URL
            const dataUrl = canvas.toDataURL('image/png');
            const action = actionSelect.value;

            // 1. Save the image
            if (action === 'save-print' || action === 'save-only') {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `photo-${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // 2. Print the image
            if (action === 'save-print' || action === 'print-only') {
                printImage(dataUrl);
            }

            // Re-enable button
            snapBtn.disabled = false;
        }

        function printImage(dataUrl) {
            const printDoc = printFrame.contentDocument || printFrame.contentWindow.document;
            const printWindow = printFrame.contentWindow;

            printDoc.open();
            printDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Print Photo</title>
                    <style>
                        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
                        img { max-width: 100%; max-height: 100%; }
                    </style>
                </head>
                <body>
                    <img src="${dataUrl}" onload="window.print();" />
                </body>
                </html>
            `);
            printDoc.close();

            // Note: The print dialog will open once the image is loaded in the iframe
        }
    </script>
</body>
</html>
