<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            font-weight: 600;
            margin-bottom: 24px;
            color: #2c3e50;
        }
        #video-container {
            border: 8px solid #fff;
            border-radius: 16px;
            position: relative;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #fff;
        }
        video {
            display: block;
            background-color: #000;
        }
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            transition: all 0.2s ease-in-out;
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }
        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 4px rgba(52, 152, 219, 0.2);
        }
        button:disabled {
            background-color: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        #snap-btn {
            background-color: #2ecc71;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            font-weight: 600;
        }
        #snap-btn:hover {
            background-color: #27ae60;
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
        }
        #canvas {
            display: none;
        }
        #print-frame {
            display: none;
        }
        #controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .menu-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            font-size: 16px;
        }
        .config-item label {
            font-weight: 500;
        }
        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            /* pointer-events: none; removed to allow dragging */
            cursor: default;
            z-index: 5;
        }
        input, select {
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            border-radius: 6px;
            border: 1px solid #dcdde1;
            background-color: #f8f9fa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            background-color: #fff;
        }
        input[type="color"] {
            padding: 2px;
            height: 38px;
            width: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Photo Booth</h1>

    <div id="video-container">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="overlay-canvas" width="640" height="480"></canvas>
        <div id="countdown"></div>
    </div>

    <div id="controls">
        <button id="settings-btn">Settings</button>
        <button id="overlay-btn">Overlay Editor</button>
        <button id="snap-btn">Take Photo</button>
    </div>

    <div id="overlay-menu" class="menu-panel">
        <div class="config-item">
            <label for="overlay-frame">Frame Image:</label>
            <input type="file" id="overlay-frame" accept="image/*">
        </div>
        <div class="config-item">
            <label for="border-style">Border Style:</label>
            <select id="border-style">
                <option value="none">None</option>
                <option value="solid">Solid</option>
                <option value="dashed">Dashed</option>
                <option value="dotted">Dotted</option>
            </select>
        </div>
        <div class="config-item">
            <label for="border-width">Border Width:</label>
            <input type="number" id="border-width" value="10" min="0" max="100">
        </div>
        <div class="config-item">
            <label for="border-color">Border Color:</label>
            <input type="color" id="border-color" value="#ffffff">
        </div>
        <div class="config-item">
            <button id="add-text-btn">Add Text</button>
        </div>
        <div id="texts-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <div class="config-item">
            <button id="hide-overlay-btn">Hide Overlay Editor</button>
        </div>
    </div>

    <div id="config-menu" class="menu-panel">
        <div class="config-item">
            <label for="camera-select">Camera:</label>
            <select id="camera-select">
                <option value="">Default</option>
            </select>
        </div>
        <div class="config-item">
            <label for="action-select">Action:</label>
            <select id="action-select">
                <option value="save-print">Save & Print</option>
                <option value="print-only">Print Only</option>
                <option value="save-only">Save Only</option>
            </select>
        </div>
        <div class="config-item">
            <label for="timer-select">Timer:</label>
            <select id="timer-select">
                <option value="0">Instant</option>
                <option value="1">1 second</option>
                <option value="3">3 seconds</option>
                <option value="5" selected>5 seconds</option>
                <option value="10">10 seconds</option>
            </select>
        </div>
        <div class="config-item">
            <label for="filter-select">Filter:</label>
            <select id="filter-select">
                <option value="none">Normal</option>
                <option value="grayscale(100%)">Grayscale</option>
                <option value="sepia(100%)">Sepia</option>
                <option value="invert(100%)">Invert</option>
                <option value="hue-rotate(90deg)">Hue Rotate</option>
                <option value="contrast(200%)">High Contrast</option>
            </select>
        </div>
        <div class="config-item">
            <label for="mirror-select">Mirror:</label>
            <select id="mirror-select">
                <option value="false" selected>Off</option>
                <option value="true">On</option>
            </select>
        </div>
        <div class="config-item">
            <button id="hide-btn">Hide Settings</button>
        </div>
    </div>
    <canvas id="canvas" width="640" height="480"></canvas>
    <iframe id="print-frame" name="print-frame"></iframe>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snap-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const hideBtn = document.getElementById('hide-btn');
        const configMenu = document.getElementById('config-menu');
        const cameraSelect = document.getElementById('camera-select');
        const actionSelect = document.getElementById('action-select');
        const timerSelect = document.getElementById('timer-select');
        const countdownDisplay = document.getElementById('countdown');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const printFrame = document.getElementById('print-frame');
        const filterSelect = document.getElementById('filter-select');
        const mirrorSelect = document.getElementById('mirror-select');

        // Overlay Editor elements
        const overlayBtn = document.getElementById('overlay-btn');
        const hideOverlayBtn = document.getElementById('hide-overlay-btn');
        const overlayMenu = document.getElementById('overlay-menu');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const overlayContext = overlayCanvas.getContext('2d');
        const overlayFrame = document.getElementById('overlay-frame');
        const addTextBtn = document.getElementById('add-text-btn');
        const textsContainer = document.getElementById('texts-container');
        const borderStyleEl = document.getElementById('border-style');
        const borderWidthEl = document.getElementById('border-width');
        const borderColorEl = document.getElementById('border-color');

        let texts = [];
        let draggingTextIndex = -1;

        let frameImage = null;
        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.has('camera')) {
            const cameraVal = urlParams.get('camera');
            cameraSelect.value = cameraVal; // Value will be checked when options are populated
        }

        if (urlParams.has('action')) {
            const actionVal = urlParams.get('action');
            if (Array.from(actionSelect.options).some(opt => opt.value === actionVal)) {
                actionSelect.value = actionVal;
            }
        }

        if (urlParams.has('timer')) {
            const timerVal = urlParams.get('timer');
            if (Array.from(timerSelect.options).some(opt => opt.value === timerVal)) {
                timerSelect.value = timerVal;
            }
        }

        if (urlParams.has('filter')) {
            const filterVal = urlParams.get('filter');
            if (Array.from(filterSelect.options).some(opt => opt.value === filterVal)) {
                filterSelect.value = filterVal;
                video.style.filter = filterVal;
            }
        }

        if (urlParams.has('mirror')) {
            const mirrorVal = urlParams.get('mirror');
            if (mirrorVal === 'true') {
                mirrorSelect.value = 'true';
                video.style.transform = 'scaleX(-1)';
            }
        }

        if (urlParams.has('texts')) {
            try {
                texts = JSON.parse(urlParams.get('texts'));
            } catch (e) { console.error('Failed to parse texts from URL', e); }
        } else {
            // Default text if nothing in URL
            texts = [{
                id: Date.now(),
                text: '',
                font: 'sans-serif',
                style: 'normal',
                size: 48,
                fill: '#ffffff',
                outline: '#000000',
                x: 320,
                y: 400
            }];
        }

        if (urlParams.has('borderStyle')) borderStyleEl.value = urlParams.get('borderStyle');
        if (urlParams.has('borderWidth')) borderWidthEl.value = urlParams.get('borderWidth');
        if (urlParams.has('borderColor')) borderColorEl.value = urlParams.get('borderColor');

        function renderTextConfigs() {
            textsContainer.innerHTML = '';
            texts.forEach((t, i) => {
                const item = document.createElement('div');
                item.style.border = '1px solid #ccc';
                item.style.padding = '10px';
                item.style.borderRadius = '5px';
                item.style.position = 'relative';


                const escapeHTML = str => String(str).replace(/[&<>'"]/g,
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );

                item.innerHTML = `
                    <button type="button" style="position: absolute; top: 5px; right: 5px; padding: 2px 5px; font-size: 12px; background: red;" onclick="removeText(${i})">X</button>
                    <div style="margin-bottom: 5px;"><label>Text:</label><input type="text" value="${escapeHTML(t.text)}" onchange="updateTextVal(${i}, 'text', this.value)" style="width: 100%;"></div>
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <select onchange="updateTextVal(${i}, 'font', this.value)">
                            <option value="sans-serif" ${t.font === 'sans-serif' ? 'selected' : ''}>Sans-Serif</option>
                            <option value="serif" ${t.font === 'serif' ? 'selected' : ''}>Serif</option>
                            <option value="monospace" ${t.font === 'monospace' ? 'selected' : ''}>Monospace</option>
                            <option value="Impact" ${t.font === 'Impact' ? 'selected' : ''}>Impact</option>
                            <option value="Comic Sans MS" ${t.font === 'Comic Sans MS' ? 'selected' : ''}>Comic Sans</option>
                        </select>
                        <select onchange="updateTextVal(${i}, 'style', this.value)">
                            <option value="normal" ${t.style === 'normal' ? 'selected' : ''}>Normal</option>
                            <option value="bold" ${t.style === 'bold' ? 'selected' : ''}>Bold</option>
                            <option value="italic" ${t.style === 'italic' ? 'selected' : ''}>Italic</option>
                            <option value="italic bold" ${t.style === 'italic bold' ? 'selected' : ''}>Bold Italic</option>
                        </select>
                        <input type="number" value="${escapeHTML(t.size)}" min="10" max="200" onchange="updateTextVal(${i}, 'size', this.value)" style="width: 60px;">
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <label>Fill:</label><input type="color" value="${escapeHTML(t.fill)}" onchange="updateTextVal(${i}, 'fill', this.value)">
                        <label>Outline:</label><input type="color" value="${escapeHTML(t.outline)}" onchange="updateTextVal(${i}, 'outline', this.value)">
                    </div>
                `;
                textsContainer.appendChild(item);
            });
        }

        window.removeText = function(index) {
            texts.splice(index, 1);
            renderTextConfigs();
            updateOverlay();
            updateURL();
        };

        window.updateTextVal = function(index, key, val) {
            texts[index][key] = val;
            updateOverlay();
            updateURL();
        };

        addTextBtn.addEventListener('click', () => {
            texts.push({
                id: Date.now(),
                text: 'New Text',
                font: 'sans-serif',
                style: 'normal',
                size: 48,
                fill: '#ffffff',
                outline: '#000000',
                x: 320,
                y: 240
            });
            renderTextConfigs();
            updateOverlay();
            updateURL();
        });


        function updateURL() {
            const currentParams = new URLSearchParams(window.location.search);
            if (cameraSelect.value) {
                currentParams.set('camera', cameraSelect.value);
            } else {
                currentParams.delete('camera');
            }
            currentParams.set('action', actionSelect.value);
            currentParams.set('timer', timerSelect.value);
            currentParams.set('filter', filterSelect.value);
            currentParams.set('mirror', mirrorSelect.value);
            currentParams.set('borderStyle', borderStyleEl.value);
            currentParams.set('borderWidth', borderWidthEl.value);
            currentParams.set('borderColor', borderColorEl.value);
            currentParams.set('texts', JSON.stringify(texts));

            const newUrl = `${window.location.pathname}?${currentParams.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        settingsBtn.addEventListener('click', () => {
            overlayMenu.style.display = 'none';
            if (configMenu.style.display === 'flex') {
                configMenu.style.display = 'none';
            } else {
                configMenu.style.display = 'flex';
            }
        });

        hideBtn.addEventListener('click', () => {
            configMenu.style.display = 'none';
            overlayBtn.style.display = 'none';
            settingsBtn.style.display = 'none';
        });

        overlayBtn.addEventListener('click', () => {
            configMenu.style.display = 'none';
            if (overlayMenu.style.display === 'flex') {
                overlayMenu.style.display = 'none';
            } else {
                overlayMenu.style.display = 'flex';
            }
        });

        hideOverlayBtn.addEventListener('click', () => {
            overlayMenu.style.display = 'none';
        });

        function updateOverlay() {
            overlayContext.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (frameImage) {
                overlayContext.drawImage(frameImage, 0, 0, overlayCanvas.width, overlayCanvas.height);
            }

            const bStyle = borderStyleEl.value;
            const bWidth = parseInt(borderWidthEl.value, 10);
            if (bStyle !== 'none' && bWidth > 0) {
                overlayContext.lineWidth = bWidth;
                overlayContext.strokeStyle = borderColorEl.value;
                if (bStyle === 'dashed') overlayContext.setLineDash([bWidth * 2, bWidth]);
                else if (bStyle === 'dotted') overlayContext.setLineDash([bWidth, bWidth]);
                else overlayContext.setLineDash([]);

                overlayContext.strokeRect(bWidth / 2, bWidth / 2, overlayCanvas.width - bWidth, overlayCanvas.height - bWidth);
                overlayContext.setLineDash([]); // Reset
            }

            texts.forEach(t => {
                if (t.text) {
                    const style = t.style === 'normal' ? '' : t.style;
                    const size = t.size + 'px';
                    const font = t.font;

                    overlayContext.font = `${style} ${size} ${font}`.trim();
                    overlayContext.textAlign = 'center';

                    overlayContext.fillStyle = t.fill;
                    overlayContext.fillText(t.text, t.x, t.y);

                    overlayContext.lineWidth = 2;
                    overlayContext.strokeStyle = t.outline;
                    overlayContext.strokeText(t.text, t.x, t.y);
                }
            });
        }

        overlayFrame.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        frameImage = img;
                        updateOverlay();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                frameImage = null;
                updateOverlay();
            }
        });

        [borderStyleEl, borderWidthEl, borderColorEl].forEach(el => {
            el.addEventListener('input', () => { updateOverlay(); updateURL(); });
        });

        overlayCanvas.addEventListener('mousedown', (e) => {
            const rect = overlayCanvas.getBoundingClientRect();
            // Need to account for potential scaling if the canvas isn't displayed at its native resolution
            const scaleX = overlayCanvas.width / rect.width;
            const scaleY = overlayCanvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            // Check if clicking near any text (very rudimentary hit detection)
            draggingTextIndex = texts.findIndex(t => {
                return Math.abs(t.x - mouseX) < 100 && Math.abs(t.y - mouseY) < 50;
            });
        });

        overlayCanvas.addEventListener('mousemove', (e) => {
            if (draggingTextIndex >= 0) {
                const rect = overlayCanvas.getBoundingClientRect();
                const scaleX = overlayCanvas.width / rect.width;
                const scaleY = overlayCanvas.height / rect.height;
                texts[draggingTextIndex].x = Math.round((e.clientX - rect.left) * scaleX);
                texts[draggingTextIndex].y = Math.round((e.clientY - rect.top) * scaleY);
                updateOverlay();
            }
        });

        overlayCanvas.addEventListener('mouseup', () => {
            if (draggingTextIndex >= 0) {
                draggingTextIndex = -1;
                updateURL();
            }
        });
        overlayCanvas.addEventListener('mouseleave', () => {
            if (draggingTextIndex >= 0) {
                draggingTextIndex = -1;
                updateURL();
            }
        });

        // Initialize UI
        renderTextConfigs();
        setTimeout(updateOverlay, 100);

        actionSelect.addEventListener('change', updateURL);
        timerSelect.addEventListener('change', updateURL);
        filterSelect.addEventListener('change', () => {
            video.style.filter = filterSelect.value;
            updateURL();
        });
        mirrorSelect.addEventListener('change', () => {
            if (mirrorSelect.value === 'true') {
                video.style.transform = 'scaleX(-1)';
            } else {
                video.style.transform = 'none';
            }
            updateURL();
        });

        let currentStream = null;

        function populateCameraList(selectedDeviceId) {
            navigator.mediaDevices.enumerateDevices().then(devices => {
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                // Clear existing options except "Default" if any
                cameraSelect.innerHTML = '<option value="">Default</option>';

                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${cameraSelect.length}`;
                    cameraSelect.appendChild(option);
                });

                // Set selected camera to the one we just started
                if (selectedDeviceId && Array.from(cameraSelect.options).some(opt => opt.value === selectedDeviceId)) {
                    cameraSelect.value = selectedDeviceId;
                }
            }).catch(err => {
                console.error("Error enumerating devices:", err);
            });
        }

        function startCamera(deviceId = '') {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: deviceId ? { deviceId: { exact: deviceId } } : true,
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    currentStream = stream;
                    video.srcObject = stream;
                    // If we asked for a specific device, or we got a device, use its id
                    const activeDeviceId = stream.getVideoTracks()[0].getSettings().deviceId;
                    populateCameraList(deviceId || activeDeviceId); // Refresh list to get labels after permission
                })
                .catch(err => {
                    console.error("Error accessing webcam:", err);
                    if (deviceId) {
                        console.warn("Falling back to default camera");
                        startCamera('');
                    } else {
                        alert("Could not access the webcam.");
                    }
                });
        }

        cameraSelect.addEventListener('change', () => {
            startCamera(cameraSelect.value);
            updateURL();
        });

        // Request initial webcam access
        startCamera(urlParams.get('camera') || '');

        snapBtn.addEventListener('click', () => {
            snapBtn.disabled = true;
            let counter = parseInt(timerSelect.value, 10);
            
            if (counter === 0) {
                takePhoto();
            } else {
                countdownDisplay.style.display = 'block';
                countdownDisplay.innerText = counter;

                const interval = setInterval(() => {
                    counter--;
                    if (counter > 0) {
                        countdownDisplay.innerText = counter;
                    } else {
                        clearInterval(interval);
                        countdownDisplay.style.display = 'none';
                        takePhoto();
                    }
                }, 1000);
            }
        });

        function takePhoto() {
            // Draw video frame to canvas
            context.filter = filterSelect.value;

            if (mirrorSelect.value === 'true') {
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
            }

            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            if (mirrorSelect.value === 'true') {
                context.setTransform(1, 0, 0, 1, 0, 0);
            }

            context.filter = 'none'; // reset filter before drawing overlay

            // Draw overlay to main canvas
            context.drawImage(overlayCanvas, 0, 0, canvas.width, canvas.height);

            // Get image data URL
            const dataUrl = canvas.toDataURL('image/png');
            const action = actionSelect.value;

            // 1. Save the image
            if (action === 'save-print' || action === 'save-only') {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `photo-${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // 2. Print the image
            if (action === 'save-print' || action === 'print-only') {
                printImage(dataUrl);
            }

            // Re-enable button
            snapBtn.disabled = false;
        }

        function printImage(dataUrl) {
            const printDoc = printFrame.contentDocument || printFrame.contentWindow.document;
            const printWindow = printFrame.contentWindow;

            printDoc.open();
            printDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Print Photo</title>
                    <style>
                        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
                        img { max-width: 100%; max-height: 100%; }
                    </style>
                </head>
                <body>
                    <img src="${dataUrl}" onload="window.print();" />
                </body>
                </html>
            `);
            printDoc.close();

            // Note: The print dialog will open once the image is loaded in the iframe
        }
    </script>
</body>
</html>
